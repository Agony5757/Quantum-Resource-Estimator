# State Preparation Operations
# For complex QRAM-based operations, use Python classes

- name: SimpleStatePrep
  description: "Simple state preparation for uniform superposition"
  qregs:
    - {name: reg, type: General}
  params:
    - {name: n_qubits, type: int}
  impl:
    - for_each:
        var: i
        items: "range(n_qubits)"
        body:
          - op: Hadamard
            qregs: [reg]

  self_conjugate: false
