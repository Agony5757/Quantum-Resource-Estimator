name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install pyqres with all dependencies
        run: pip install -e ".[test]"

      - name: Run tests
        run: pytest tests/ -v

      - name: DSL compile & check
        run: |
          pyqres compile
          pyqres check || true
